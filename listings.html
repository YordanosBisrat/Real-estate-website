<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>MyEstate — Listings</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a class="logo" href="index.html">MyEstate</a>
      <nav class="nav">
        <a href="index.html" class="nav-link">Home</a>
        <a href="listings.html" class="nav-link">Listings</a>
        <a href="contact.html" class="nav-link">Contact</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="listings container">
      <div class="listings-top">
        <h1>All Listings</h1>
        <p class="muted">Showing sample static listings — filtering is optional</p>
      </div>

      <!-- filters (non-functional) -->
      <div class="filters">
        <label>
          <span class="sr-only">Search</span>
          <input type="search" placeholder="Search by city, neighborhood or type" aria-label="Search listings">
        </label>
        <label>
          <select aria-label="Sort">
            <option>Sort: Newest</option>
            <option>Price: Low to High</option>
            <option>Price: High to Low</option>
          </select>
        </label>
      </div>

      <div class="listings-grid">
        <!-- repeat card similar to index -->
        <article class="card">
          <img src="images/house1.jpg" alt="Cozy apartment">
          <div class="card-body">
            <h3>Urban Studio — 1 Bed</h3>
            <p class="price">$120,000 • 1 bed • 1 bath</p>
            <p class="muted">Addis Ababa</p>
          </div>
        </article>

        <article class="card">
          <img src="images/house2.jpg" alt="Family house">
          <div class="card-body">
            <h3>Family Home — 3 Bed</h3>
            <p class="price">$320,000 • 3 bed • 2 bath</p>
            <p class="muted">Bole</p>
          </div>
        </article>

        <article class="card">
          <img src="images/house3.jpg" alt="Modern villa">
          <div class="card-body">
            <h3>Modern Villa — 4 Bed</h3>
            <p class="price">$850,000 • 4 bed • 4 bath</p>
            <p class="muted">Lideta</p>
          </div>
        </article>

        <!-- add as many sample cards as you want -->
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <p>&copy; <span id="year2"></span> MyEstate</p>
    </div>
  </footer>

  <script>document.getElementById('year2').textContent = new Date().getFullYear();</script>
</body>
</html>
