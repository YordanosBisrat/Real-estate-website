<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>MyEstate — Contact</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a class="logo" href="index.html">MyEstate</a>
      <nav class="nav">
        <a href="index.html" class="nav-link">Home</a>
        <a href="listings.html" class="nav-link">Listings</a>
        <a href="contact.html" class="nav-link">Contact</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="contact container">
      <h1>Contact Us</h1>
      <p class="muted">Send a message and our agents will reply.</p>

      <form class="contact-form" action="#" method="post" novalidate>
        <label>
          <span class="label-text">Name</span>
          <input type="text" name="name" placeholder="Your name" required>
        </label>
        <label>
          <span class="label-text">Email</span>
          <input type="email" name="email" placeholder="you@example.com" required>
        </label>
        <label>
          <span class="label-text">Message</span>
          <textarea name="message" rows="6" placeholder="Your message"></textarea>
        </label>
        <button class="btn" type="submit">Send Message</button>
      </form>

      <div class="contact-info">
        <h3>Office</h3>
        <p>123 Sample Street, Addis Ababa</p>
        <p>Email: info@myestate.example</p>
        <p>Phone: +251 9xx xxx xxxx</p>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <p>&copy; <span id="year3"></span> MyEstate</p>
    </div>
  </footer>

  <script>document.getElementById('year3').textContent = new Date().getFullYear();</script>
</body>
</html>
